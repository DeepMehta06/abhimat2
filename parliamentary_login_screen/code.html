<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Parliamentary Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9933",
                        "background-light": "#ffffff",
                        "background-dark": "#23190f",
                        "saffron": "#FF9933",
                        "ashoka-blue": "#000080",
                        "india-green": "#138808",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Crimson Text", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'tricolor-gradient': 'linear-gradient(to right, #FF9933, #ffffff, #138808)',
                    },
                    keyframes: {
                        'wave-gradient': {
                            '0%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                            '100%': { 'background-position': '0% 50%' },
                        },
                        'spin-slow': {
                            'from': { transform: 'rotate(0deg)' },
                            'to': { transform: 'rotate(360deg)' }
                        }
                    },
                    animation: {
                        'wave-gradient': 'wave-gradient 4s ease infinite',
                        'spin-slow': 'spin-slow 8s linear infinite',
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
        .btn-wavy-tricolor {
            background: linear-gradient(110deg, 
                #FF9933 0%, 
                #FF9933 40%, 
                #138808 50%, 
                #FF9933 60%, 
                #FF9933 100%);
            background-size: 200% 200%;
            color: white;
            animation: wave-gradient 3s linear infinite;
        }
        @keyframes wave-gradient {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white dark:bg-neutral-950 min-h-screen flex items-center justify-center font-display overflow-hidden">
<div class="fixed inset-0 z-0">
<img alt="Secretariat Building North Block New Delhi" class="w-full h-full object-cover blur-sm scale-105 opacity-60 brightness-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBccq65TH4lmyK_ArGQ6tWrJx-icSahLTXrP5LavJ5vKLX5dNY9Io0s0vTuYf3CgHLwU5DzHAbQ0Nqlbk-ii7BEo1w9_qIF9s087gaR-4cnjMLHxA-nTQYkUIyUCYcVxYT5o0byV0TiD-mRqrCq_vKs59o081vVWutKkdfp_iqb6GAs4kt9bBrYHKdusqYELbz0qsc172X8R1qpyn2y_f3laVqacJ4qtn6aD3D1YkL2ZiEiVX3RHvn96cKpTQdBe3DvIIP7PWTJ0tA"/>
<div class="absolute inset-0 bg-gradient-to-b from-white/80 via-white/40 to-white/80"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_white_100%)] opacity-40"></div>
</div>
<main class="relative z-10 w-full max-w-[400px] px-6 py-12 flex flex-col items-center justify-center min-h-screen">
<div class="w-full bg-white dark:bg-neutral-900 rounded-xl shadow-2xl p-8 relative overflow-hidden">
<div class="absolute bottom-4 right-4 opacity-[0.05] pointer-events-none">
<img alt="National Emblem Watermark" class="w-32 h-32 grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDO91_j9XD3SisHukXoZPso-C5Cp-Lu8mpCa8lCxsGei--oCTYCHcNN90xteAd5vz3V0GOBEeCTtRinJ_jnBTWkB67Cywa9gGI5ty0ANUEoLldjMQgxBLU34BGhKs5sO2VA59F9mtBXewOrtZYeTA4qKI06XA3A3OTgVhF7HPDgn85JkFkw94RO1uexGld4VGwFUu8aaOGbXctWPj5LYlH_3aVNtR8_Vcd_aivI26FwRdR3Sx9hQUGP8_2iugVH2pd3OLUojDtmrZM"/>
</div>
<div class="relative z-10">
<header class="text-center mb-6">
<h3 class="text-india-green font-bold text-lg tracking-widest uppercase mb-4">Parliamentary Login</h3>
<div class="flex items-center justify-center gap-4">
<div class="h-[2px] flex-1 bg-gradient-to-r from-transparent via-saffron to-saffron"></div>
<span class="material-icons-round text-ashoka-blue text-2xl animate-spin-slow">brightness_7</span>
<div class="h-[2px] flex-1 bg-gradient-to-l from-transparent via-india-green to-india-green"></div>
</div>
</header>
<form class="space-y-5">
<div>
<label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wider mb-1.5 ml-1">Username / Member ID</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-icons-round text-saffron text-lg">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-neutral-50 dark:bg-neutral-800 border-2 border-neutral-100 dark:border-neutral-700 rounded-lg focus:outline-none focus:border-saffron focus:ring-1 focus:ring-saffron transition-colors text-neutral-800 dark:text-neutral-100 placeholder:text-neutral-400" placeholder="e.g. LS-2026-001" type="text"/>
</div>
</div>
<div>
<label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wider mb-1.5 ml-1">Secret Key / Password</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-icons-round text-india-green text-lg">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-neutral-50 dark:bg-neutral-800 border-2 border-neutral-100 dark:border-neutral-700 rounded-lg focus:outline-none focus:border-india-green focus:ring-1 focus:ring-india-green transition-colors text-neutral-800 dark:text-neutral-100 placeholder:text-neutral-400" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-saffron" type="button">
<span class="material-icons-round text-lg">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full group rounded-lg overflow-hidden shadow-lg hover:shadow-xl transition-shadow focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-saffron" type="submit">
<div class="w-full btn-wavy-tricolor px-6 py-3.5 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="text-white font-bold tracking-widest uppercase text-sm drop-shadow-md z-10 relative">Enter Session</span>
<span class="material-icons-round text-lg text-white drop-shadow-md z-10 relative">login</span>
</div>
</button>
</div>
</form>
<footer class="mt-8 text-center">
<a class="text-sm font-bold text-india-green hover:text-emerald-800 transition-colors" href="#">
                        Forgot Credentials?
                    </a>
<p class="mt-6 text-[10px] text-neutral-400 uppercase tracking-widest flex items-center justify-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-saffron"></span>
                        Model Lok Sabha Event
                        <span class="w-1.5 h-1.5 rounded-full bg-india-green"></span>
</p>
</footer>
</div>
</div>
</main>
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-neutral-200/50 rounded-full"></div>

</body></html>
